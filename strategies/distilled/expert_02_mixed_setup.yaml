name: expert_02_mixed_setup
display_name: 高手蒸馏-混合形态-电力
description: 从 broker_export 蒸馏出的高手交易模式，样本5笔，胜率60.0%，均收益0.21%。 该模式主要在 电力 板块内出现。
category: framework
core_rules:
- 2
- 4
- 6
required_tools:
- get_daily_history
- analyze_trend
- get_realtime_quote
- get_sector_rankings
instructions: "**高手蒸馏-混合形态-电力**\n\n这是一条从真实高手成交记录中蒸馏出的经验型 strategy，不是拍脑袋规则。\n当前样本:\
  \ 5笔，胜率 60.0%，均收益 0.21%，中位持有 0.0 天。\n\n执行要点：\n\n1. **先确认环境匹配**：\n   - 优先在 `电力` 板块或强相关细分方向内使用，避免跨板块硬套。\n\
  \   - 仅在买点当日形态接近这条模式时加分，不要因为名字相似就强行套用。\n\n2. **技术面过滤**：\n   - 中位换手率约 `0.0%`，量比中位数约\
  \ `1.37`。\n   - RSI 中位数约 `50.9`，20日位置中位数约 `74.7%`。\n   - 当日涨跌幅中位数约 `-5.17%`，只有在承接与量能接近样本特征时才提高信心。\n\
  \n3. **仓位与纪律**：\n   - 这是加分型 skill，不是无条件开仓指令。\n   - 若大盘弱、板块不跟、开盘承接差，即使形态相似也要降级处理。\n\
  \n4. **输出要求**：\n   - 在 `buy_reason` 中明确标注“高手蒸馏-混合形态-电力”。\n   - 如果你认为当前个股与该模式不匹配，要明确写出不匹配原因，而不是模糊带过。\n"
